---
layout: default
title: ブログ
permalink: /blog/
---

<h1>ブログ</h1>

<section class="blog-list">
  {% for post in site.posts %}
    <article>
      <h2><a href="{{ post.url }}">{{ post.title }}</a></h2>
      <p class="post-meta">{{ post.author }} / {{ post.date | date: "%Y年%-m月%-d日" }}</p>
      {% if post.excerpt %}
        <p>{{ post.excerpt }}</p>
      {% endif %}
      <p><a href="{{ post.url }}">続きを読む</a></p>
    </article>
  {% endfor %}
</section>
